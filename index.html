<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoleX — The Sneaker Bid Exchange</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #16161a;
            --accent-color: #ff3e3e;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #2d2d34;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; }
        header h1 span { color: var(--accent-color); }
        header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.9rem; }

        .badges { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .badge { background: #24242b; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d2d34;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }

        .card-img-container {
            background: radial-gradient(circle, #2a2a35 0%, #16161a 100%);
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-img-container img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .condition-badge {
            position: absolute; top: 15px; left: 15px; background-color: var(--accent-color);
            color: white; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; border-radius: 4px;
        }

        .card-content { padding: 20px; }
        .pk-id { font-family: monospace; color: var(--accent-color); font-size: 0.8rem; margin-bottom: 5px; }
        .brand { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin: 0; }
        .model-name { margin: 5px 0 10px 0; font-size: 1.3rem; font-weight: 700; }

        .technical-details { background-color: #1c1c22; padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 15px; color: var(--text-muted); }
        .technical-details div { margin-bottom: 4px; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .price-box h4 { margin: 0; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .price-box p { margin: 0; font-size: 1.4rem; font-weight: bold; color: #00ff66; }

        .btn-bid {
            background-color: transparent; border: 2px solid var(--accent-color); color: var(--text-color);
            padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s ease;
        }

        .btn-bid:hover { background-color: var(--accent-color); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }
    </style>
</head>
<body>

    <header>
        <h1>SoleX<span>.</span></h1>
        <p>The Sneaker Bid Exchange — Subastas Conectadas a Base de Datos en Vivo</p>
        <div class="badges">
            <span class="badge">🔨 Base de datos Realtime</span>
            <span class="badge">🤖 Estructura Cátedra</span>
        </div>
    </header>

    <div class="container">
        <div class="grid" id="sneakers-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE (Reemplazar con tus credenciales en el Paso 2 si querés tu propia BD)
        // Por ahora te dejo una base de datos pública temporal para que veas cómo funciona ya mismo
        const firebaseConfig = {
            databaseURL: "https://solex-ebd19-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Datos iniciales de tu Registro Cátedra
        const productosIniciales = {
            "SLX-2026-AJ1-042": {
                modelo: "Air Jordan 1 Retro High OG",
                talle_us: 10.5,
                precio_base: 350.00,
                stock: 1,
                condicion: "D",
                fabricacion: { marca: "Nike / Jordan", colorway: "Chicago Reimagined", anio_edicion: 2024 },
                fecha_lanzamiento: { dia: 19, mes: 11, anio: 2024 },
                imagen_url: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=500"
            },
            "SLX-2026-SB-088": {
                modelo: "Dunk Low Pro SB 'Panda'",
                talle_us: 9.0,
                precio_base: 120.00,
                stock: 3,
                condicion: "N",
                fabricacion: { marca: "Nike SB", colorway: "Black/White", anio_edicion: 2023 },
                fecha_lanzamiento: { dia: 10, mes: 3, anio: 2021 },
                imagen_url: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500"
            }
        };

        const grid = document.getElementById('sneakers-grid');

        // Escuchar cambios de la Base de Datos en Tiempo Real
        const sneakersRef = ref(db, 'sneakers');
        onValue(sneakersRef, (snapshot) => {
            const data = snapshot.val();
            
            // Si la base de datos está vacía, la inicializamos con tus registros
            if (!data) {
                set(sneakersRef, productosIniciales);
                return;
            }

            // Limpiamos la pantalla y renderizamos con los precios actualizados de la BD
            grid.innerHTML = "";
            for (const id in data) {
                const sneaker = data[id];
                const cardHtml = `
                    <div class="card">
                        <div class="card-img-container">
                            <span class="condition-badge">${sneaker.condicion === 'D' ? 'Deadstock' : 'Nuevo'}</span>
                            <img src="${sneaker.imagen_url}" alt="${sneaker.modelo}">
                        </div>
                        <div class="card-content">
                            <div class="pk-id">PK (Clave Primaria): ${id}</div>
                            <p class="brand">${sneaker.fabricacion.marca}</p>
                            <h3 class="model-name">${sneaker.modelo}</h3>
                            <div class="technical-details">
                                <div><strong>Colorway:</strong> ${sneaker.fabricacion.colorway}</div>
                                <div><strong>Talle US:</strong> ${sneaker.talle_us} | <strong>Stock:</strong> ${sneaker.stock}</div>
                                <div><strong>Lanzamiento:</strong> ${sneaker.fecha_lanzamiento.dia}/${sneaker.fecha_lanzamiento.mes}/${sneaker.fecha_lanzamiento.anio}</div>
                            </div>
                            <div class="price-row">
                                <div class="price-box">
                                    <h4>Oferta Actual</h4>
                                    <p>US$ ${parseFloat(sneaker.precio_base).toFixed(2)}</p>
                                </div>
                                <button class="btn-bid" data-id="${id}" data-current="${sneaker.precio_base}">Pujar</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            }

            // Añadir eventos a los botones de puja
            document.querySelectorAll('.btn-bid').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    const precioActual = parseFloat(e.target.getAttribute('data-current'));
                    
                    const nuevaOferta = prompt(`El precio actual es US$ ${precioActual}. Escribí tu nueva oferta (debe ser mayor):`);
                    
                    if (nuevaOferta && !isNaN(nuevaOferta) && parseFloat(nuevaOferta) > precioActual) {
                        // Guardar el nuevo precio directamente en el nodo correspondiente de la Base de Datos
                        set(ref(db, `sneakers/${id}/precio_base`), parseFloat(nuevaOferta))
                            .then(() => alert("¡Puja guardada en la base de datos con éxito!"))
                            .catch(err => alert("Error al conectar con la base de datos."));
                    } else if (nuevaOferta) {
                        alert("Oferta inválida. Debe ser un número mayor al precio actual.");
                    }
                });
            });
        });
    </script>
</body>
</html>
