<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoleX — The Sneaker Bid Exchange</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #16161a;
            --accent-color: #ff3e3e;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #2d2d34;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; }
        header h1 span { color: var(--accent-color); }
        header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.9rem; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d2d34;
            display: flex;
            flex-direction: column;
        }

        .card-img-container {
            background: radial-gradient(circle, #2a2a35 0%, #16161a 100%);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-img-container img { max-width: 70%; max-height: 70%; object-fit: contain; }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .pk-id { font-family: monospace; color: var(--accent-color); font-size: 0.8rem; margin-bottom: 5px; }
        .model-name { margin: 5px 0 10px 0; font-size: 1.3rem; font-weight: 700; }

        .technical-details { background-color: #1c1c22; padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 15px; color: var(--text-muted); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-bottom: 15px; border-bottom: 1px dashed #2d2d34; }
        .price-box p { margin: 0; font-size: 1.4rem; font-weight: bold; color: #00ff66; }

        .btn-bid {
            background-color: transparent; border: 2px solid var(--accent-color); color: var(--text-color);
            padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-bid:hover { background-color: var(--accent-color); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }

        /* SECCIÓN DEL HISTORIAL EN LA CARTA */
        .history-box {
            margin-top: 15px;
            background-color: #0f0f12;
            padding: 10px;
            border-radius: 6px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .history-box h4 { margin: 0 0 8px 0; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1c1c22; }
        .history-item:last-child { border-none; }
        .history-price { color: #00ff66; font-weight: bold; }
        .history-time { color: var(--text-muted); font-size: 0.75rem; }
    </style>
</head>
<body>

    <header>
        <h1>SoleX<span>.</span></h1>
        <p>The Sneaker Bid Exchange — Registros de Subastas Guardados en BD Remota</p>
    </header>

    <div class="container">
        <div class="grid" id="sneakers-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // =======================================================
        // ⚠️ COLOCÁ TU LINK DE FIREBASE REALTIME ACÁ ABAJO ⚠️
        // =======================================================
        const firebaseConfig = {
            databaseURL: "TU_LINK_DE_FIREBASE_AQUÍ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Datos iniciales estructurados como registros (Cátedra)
        const productosIniciales = {
            "SLX-2026-AJ1-042": {
                modelo: "Air Jordan 1 Retro High OG",
                talle_us: 10.5,
                precio_base: 350.00,
                stock: 1,
                condicion: "D",
                fabricacion: { marca: "Nike / Jordan", colorway: "Chicago Reimagined", anio_edicion: 2024 },
                fecha_lanzamiento: { dia: 19, mes: 11, anio: 2024 },
                imagen_url: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=500"
            },
            "SLX-2026-SB-088": {
                modelo: "Dunk Low Pro SB 'Panda'",
                talle_us: 9.0,
                precio_base: 120.00,
                stock: 3,
                condicion: "N",
                fabricacion: { marca: "Nike SB", colorway: "Black/White", anio_edicion: 2023 },
                fecha_lanzamiento: { dia: 10, mes: 3, anio: 2021 },
                imagen_url: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500"
            }
        };

        const grid = document.getElementById('sneakers-grid');

        // Escuchar base de datos completa (Productos + Historiales)
        onValue(ref(db), (snapshot) => {
            const baseDeDatosGlobal = snapshot.val() || {};
            
            // Si la rama de zapatillas está vacía, cargamos los datos base
            if (!baseDeDatosGlobal.sneakers) {
                set(ref(db, 'sneakers'), productosIniciales);
                return;
            }

            const dataSneakers = baseDeDatosGlobal.sneakers;
            const dataHistoriales = baseDeDatosGlobal.historial_pujas || {};

            grid.innerHTML = "";

            for (const id in dataSneakers) {
                const sneaker = dataSneakers[id];
                
                // Buscar y ordenar las pujas que correspondan a esta zapatilla en particular
                const listaPujasHtml = [];
                if (dataHistoriales[id]) {
                    Object.values(dataHistoriales[id])
                        .sort((a, b) => b.timestamp - a.timestamp) // Mostrar la última arriba
                        .forEach(p => {
                            listaPujasHtml.push(`
                                <li class="history-item">
                                    <span class="history-time">${p.hora}</span>
                                    <span class="history-user">${p.usuario}</span>
                                    <span class="history-price">US$ ${p.monto}</span>
                                </li>
                            `);
                        });
                } else {
                    listaPujasHtml.push(`<li class="history-item" style="color:var(--text-muted)">Sin pujas registradas</li>`);
                }

                const cardHtml = `
                    <div class="card">
                        <div class="card-img-container">
                            <img src="${sneaker.imagen_url}" alt="${sneaker.modelo}">
                        </div>
                        <div class="card-content">
                            <div class="pk-id">PK: ${id}</div>
                            <h3 class="model-name">${sneaker.modelo}</h3>
                            <div class="technical-details">
                                <div><strong>Marca:</strong> ${sneaker.fabricacion.marca}</div>
                                <div><strong>Talle US:</strong> ${sneaker.talle_us}</div>
                            </div>
                            <div class="price-row">
                                <div class="price-box">
                                    <p>US$ ${parseFloat(sneaker.precio_base).toFixed(2)}</p>
                                </div>
                                <button class="btn-bid" data-id="${id}" data-current="${sneaker.precio_base}">Pujar</button>
                            </div>
                            <div class="history-box">
                                <h4>📜 Historial de Ofertas Guardadas</h4>
                                <ul class="history-list">${listaPujasHtml.join('')}</ul>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            }

            // Configurar botones de acción
            document.querySelectorAll('.btn-bid').forEach(button => {
                button.addEventListener('click', () => {
                    const id = button.getAttribute('data-id');
                    const precioActual = parseFloat(button.getAttribute('data-current'));
                    
                    const nombre = prompt("Ingresá tu nombre/usuario para registrar la oferta:");
                    if (!nombre) return;

                    const nuevaOferta = prompt(`Precio actual US$ ${precioActual}. ¿Cuánto querés ofertar?:`);
                    
                    if (nuevaOferta && !isNaN(nuevaOferta) && parseFloat(nuevaOferta) > precioActual) {
                        const montoNumerico = parseFloat(nuevaOferta);
                        const ahora = new Date();
                        const horaFormateada = ahora.toLocaleTimeString() + " (" + ahora.toLocaleDateString() + ")";

                        // 1. Guardamos la oferta en la lista histórica de Firebase bajo la PK de la zapatilla
                        const nuevoNodoHistorialRef = push(ref(db, `historial_pujas/${id}`));
                        set(nuevoNodoHistorialRef, {
                            usuario: nombre,
                            monto: montoNumerico,
                            hora: horaFormateada,
                            timestamp: ahora.getTime()
                        });

                        // 2. Actualizamos el precio máximo de la zapatilla
                        set(ref(db, `sneakers/${id}/precio_base`), montoNumerico);

                        alert("¡Oferta procesada y registrada de por vida en la base de datos!");
                    } else if (nuevaOferta) {
                        alert("Monto inválido. Recordá que tiene que superar la oferta actual.");
                    }
                });
            });
        });
    </script>
</body>
</html>
